<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Download the UnionGolf app from the App Store or Google Play Store.">
  <meta name="apple-itunes-app" content="app-id=6689505093, app-argument=uniongolf://registration">
  <title>UnionGolf App</title>
  <style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
    }

    .container {
        margin-top: 50px;
    }

    .app-icon {
        width: 150px;
        height: 150px;
        border-radius: 20px;
        margin-bottom: 20px;
    }

    .buttons {
        margin: 20px;
    }

    .store-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 10px;
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        color: black;
        background-color: white;
        font-size: 16px;
        width: 220px;
    }

    .store-button img {
        width: 24px;
        height: 24px;
        margin-right: 10px;
    }

    .store-button:hover {
        opacity: 0.9;
    }
  </style>
</head>
<body>
<div class="container">
  <img src="dgu_icon.png" alt="UnionGolf App Icon" class="app-icon">
  <h1>Private round</h1>
  <p>Download from App Store or Google Play Store.</p>

  <div class="buttons">
    <!-- App Store Button -->
    <a href="https://apps.apple.com/dk/app" class="store-button app-store">
      <img src="apple_icon.png" alt="Apple Store Icon"> <!-- Apple icon -->
      Gå til App Store
    </a>

    <!-- Play Store Button -->
    <a href="https://play.google.com/store/apps" class="store-button play-store">
      <img src="google_icon.png" alt="Google Play Icon"> <!-- Android icon -->
      Gå til Play Store
    </a>
  </div>
</div>
<script src="redirect.js"></script>
